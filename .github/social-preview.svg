<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-social" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent-social" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow-emerald-social">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-blue-social">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow-social">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill gradients -->
    <linearGradient id="spill-emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-social)"/>

  <!-- Grid lines -->
  <g stroke="#10b981" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="448" x2="1280" y2="448"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="0" y1="576" x2="1280" y2="576"/>
    <line x1="128" y1="0" x2="128" y2="640"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="384" y1="0" x2="384" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="896" y1="0" x2="896" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
    <line x1="1152" y1="0" x2="1152" y2="640"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="320" cy="280" r="200" fill="#10b981" opacity="0.04"/>
  <circle cx="320" cy="280" r="120" fill="#10b981" opacity="0.06"/>
  <circle cx="960" cy="320" r="180" fill="#3b82f6" opacity="0.04"/>
  <circle cx="960" cy="320" r="100" fill="#3b82f6" opacity="0.06"/>
  <!-- Extra subtle glow at center -->
  <circle cx="640" cy="300" r="150" fill="#059669" opacity="0.02"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent-social)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accent-social)"/>

  <!-- Shield with chain-link icon (larger) -->
  <g transform="translate(640, 150)" filter="url(#icon-glow-social)">
    <!-- Shield shape -->
    <path d="M0,-62 L-46,-39 L-46,6 C-46,36 -16,58 0,68 C16,58 46,36 46,6 L46,-39 Z"
          fill="none" stroke="url(#accent-social)" stroke-width="3.5" opacity="0.9"/>
    <!-- Chain link top -->
    <rect x="-12" y="-36" width="24" height="30" rx="12" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <!-- Chain link bottom -->
    <rect x="-12" y="-14" width="24" height="30" rx="12" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.8"/>
    <!-- Lock bar across overlap -->
    <line x1="-7" y1="-6" x2="7" y2="-6" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="640" y="278" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">supply-chain-mcp-server</text>

  <!-- Subtitle -->
  <text x="640" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="0.8">Supply Chain Security Intelligence for AI Agents</text>

  <!-- Accent line -->
  <rect x="500" y="342" width="280" height="3" rx="1.5" fill="url(#accent-social)" opacity="0.6"/>

  <!-- Stats pills row -->
  <g transform="translate(640, 400)">
    <!-- 90 Tools (emerald) -->
    <g transform="translate(-340, 0)">
      <rect x="-52" y="-17" width="104" height="34" rx="17" fill="url(#spill-emerald)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#10b981">90 Tools</text>
    </g>
    <!-- 21 Sources (blue) -->
    <g transform="translate(-172, 0)">
      <rect x="-62" y="-17" width="124" height="34" rx="17" fill="url(#spill-blue)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#3b82f6">21 Sources</text>
    </g>
    <!-- MCP Protocol (indigo) -->
    <g transform="translate(10, 0)">
      <rect x="-58" y="-17" width="116" height="34" rx="17" fill="url(#spill-indigo)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#6366f1">MCP Protocol</text>
    </g>
    <!-- CLI (violet) -->
    <g transform="translate(160, 0)">
      <rect x="-32" y="-17" width="64" height="34" rx="17" fill="url(#spill-violet)" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#8b5cf6">CLI</text>
    </g>
    <!-- Zero Auth (green) -->
    <g transform="translate(290, 0)">
      <rect x="-48" y="-17" width="96" height="34" rx="17" fill="url(#spill-green)" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#22c55e">Zero Auth</text>
    </g>
  </g>

  <!-- Source names -->
  <text x="640" y="476" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14" fill="#52525b" letter-spacing="1.2">OSV · NVD · EPSS · KEV · npm · PyPI · crates.io · deps.dev · Scorecard · Rekor</text>

  <!-- Author -->
  <text x="640" y="530" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#71717a" letter-spacing="0.5">github.com/badchars</text>

  <!-- Bottom tagline -->
  <text x="640" y="570" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#3f3f46" letter-spacing="3">MODEL CONTEXT PROTOCOL</text>

  <!-- Decorative corner dots -->
  <circle cx="30" cy="30" r="2.5" fill="#10b981" opacity="0.3"/>
  <circle cx="1250" cy="30" r="2.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="30" cy="610" r="2.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1250" cy="610" r="2.5" fill="#10b981" opacity="0.3"/>

  <!-- Side accent lines -->
  <rect x="0" y="200" width="3" height="240" rx="1.5" fill="url(#accent-social)" opacity="0.15"/>
  <rect x="1277" y="200" width="3" height="240" rx="1.5" fill="url(#accent-social)" opacity="0.15"/>
</svg>